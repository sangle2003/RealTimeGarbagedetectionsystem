{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 text-center">
        <h2 class="display-6 text-success fw-bold mb-3">🎥 Live Garbage Detection</h2>
        <p class="text-muted mb-4">Use the camera to detect garbage in real-time. The system will automatically count and alert you.</p>

        <div class="card shadow-lg border-0 bg-dark text-white mb-4">
            <div class="card-body p-2 d-flex justify-content-center align-items-center" style="min-height: 400px; background-color: #000; border-radius: 8px;">
                <img id="feed" class="img-fluid rounded" style="display: none; width: 100%; max-height: 500px; object-fit: contain;" alt="Camera Feed">
                <div id="placeholder" class="text-muted">
                    <h4 class="mb-0">📷 Camera is OFF</h4>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-3">
            <button onclick="start()" class="btn btn-success btn-lg px-4 shadow">
                ▶ Start Camera
            </button>
            <button onclick="stop()" class="btn btn-danger btn-lg px-4 shadow">
                ⏹ Stop Camera
            </button>
        </div>

        <div class="mt-4">
            <a href="/dashboard/worker" class="btn btn-outline-secondary">⬅ Back to Dashboard</a>
        </div>
    </div>
</div>

<script>
    function start() {
        var feed = document.getElementById("feed");
        var placeholder = document.getElementById("placeholder");
        
        // Show video feed, hide placeholder
        placeholder.style.display = "none";
        feed.style.display = "block";
        feed.src = "/video-feed";
    }

    function stop() {
        var feed = document.getElementById("feed");
        var placeholder = document.getElementById("placeholder");

        // Stop camera backend process
        fetch("/stop-camera")
            .then(response => {
                // Hide video feed, show placeholder
                feed.src = "";
                feed.style.display = "none";
                placeholder.style.display = "block";
            });
    }
</script>
{% endblock %}
