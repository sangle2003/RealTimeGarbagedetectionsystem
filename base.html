<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Garbage Detection System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='image.css') }}">

    <!-- 🔥 Navbar Fix (icon visible) -->
    <style>
        .navbar-toggler {
            border: none;
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }
    </style>
</head>

<body>
    <body class="{% block body_class %}{% endblock %}">

<div class="overlay">

    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">♻️ Smart Garbage Detection</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/live-detection">🎥 Live Detection</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/login/user">👤 User Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/login/worker">👷 Worker Login</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>
    <div class="overlay">
        {% block overlay %}{% endblock %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
