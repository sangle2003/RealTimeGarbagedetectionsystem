{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-success text-white text-center py-4">
                <i class="bi bi-person-plus-fill display-4"></i>
                <h3 class="mt-2 fw-bold">Citizen Registration</h3>
                <p class="small text-light opacity-75 mb-0">Join the Smart Garbage Management System</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" name="email" class="form-control border-start-0 bg-light" required placeholder="example@mail.com">
                        </div>
                        <div class="form-text text-muted">We'll never share your email with anyone else.</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Create Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-lock-fill"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 bg-light" required placeholder="Min. 6 characters">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm fw-bold mb-3">
                        <i class="bi bi-check-circle-fill me-2"></i>Create Account
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="text-muted mb-0">Already have an account?</p>
                    <a href="/login/user" class="text-success fw-bold text-decoration-none">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login Here
                    </a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none text-muted small"><i class="bi bi-house-door me-1"></i>Back to Home</a>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
