{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-success text-white text-center py-3">
                    <h3 class="mb-0 fw-bold"><i class="bi bi-megaphone-fill me-2"></i>Report Garbage</h3>
                </div>
                
                <div class="card-body p-4">
                    <p class="text-center text-muted mb-4">Click on the map to mark the exact location and upload a photo of the waste.</p>
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-7 mb-3">
                                <label class="form-label fw-bold text-success">1. Select Location on Map</label>
                                <div id="map" class="rounded-3 shadow-sm border" style="height: 400px;"></div>
                                <small class="text-muted mt-2 d-block"><i class="bi bi-info-circle"></i> Tip: You can drag the map or click to move the marker.</small>
                            </div>

                            <div class="col-md-5">
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-success">2. Detected Address</label>
                                    <textarea id="address" name="address" class="form-control bg-light" rows="3" readonly required placeholder="Click map to fetch address..."></textarea>
                                </div>

                                <input type="hidden" id="lat" name="lat">
                                <input type="hidden" id="lng" name="lng">

                                <div class="mb-4">
                                    <label class="form-label fw-bold text-success">3. Upload Proof (Photo)</label>
                                    <div class="input-group">
                                        <input type="file" name="image" class="form-control" id="imageInput" accept="image/*" required>
                                    </div>
                                    <div id="imagePreview" class="mt-2 text-center d-none">
                                        <img src="#" alt="Preview" class="img-thumbnail" style="max-height: 150px;">
                                    </div>
                                </div>

                                <hr>

                                <button type="submit" class="btn btn-success btn-lg w-100 py-3 shadow fw-bold mt-2">
                                    <i class="bi bi-cloud-arrow-up-fill me-2"></i>Submit Report
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4 mb-5">
                <a href="/dashboard/user" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // 1. Initialize the Map
    var map = L.map('map').setView([20.5937, 78.9629], 5); // Default: India
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var marker;

    // 2. Function to Update Form with Address & Coordinates
    function setLocation(lat, lng){
        document.getElementById('lat').value = lat;
        document.getElementById('lng').value = lng;
        
        if(marker) { map.removeLayer(marker); }
        marker = L.marker([lat, lng]).addTo(map);

        // Reverse Geocoding (Lat/Lng to Address)
        var url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;
        fetch(url)
        .then(response => response.json())
        .then(data => {
            document.getElementById('address').value = (data && data.display_name) ? data.display_name : "Address not found";
        })
        .catch(() => {
            document.getElementById('address').value = "Error fetching address";
        });
    }

    // 3. Auto-detect Current User Location
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;
            map.setView([lat, lng], 15);
            setLocation(lat, lng);
        });
    }

    // 4. Update Marker on Map Click
    map.on('click', function(e){
        setLocation(e.latlng.lat, e.latlng.lng);
    });

    // 5. Image Preview Logic
    document.getElementById('imageInput').onchange = evt => {
        const [file] = document.getElementById('imageInput').files;
        if (file) {
            const preview = document.getElementById('imagePreview');
            preview.classList.remove('d-none');
            preview.querySelector('img').src = URL.createObjectURL(file);
        }
    }
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
