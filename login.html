<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Garbage Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            /* 🔥 BACKGROUND IMAGE ADDED */
            background: url("/static/garbage_bg.png") no-repeat center center fixed;
            background-size: cover;

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            color: #1d976c;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: #1d976c;
            box-shadow: 0 0 0 0.25rem rgba(29, 151, 108, 0.25);
        }

        .btn-login {
            background: #1d976c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #167a56;
            transform: translateY(-2px);
        }

        .brand-icon {
            font-size: 3rem;
            color: #1d976c;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: #1d976c;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="login-card shadow">
    <i class="bi bi-recycle brand-icon"></i>
    <h2>{{ title }}</h2>
    <p class="text-center text-muted mb-4">Welcome back! Please enter your details.</p>

    <form action="/login/{{ role }}" method="POST">
        
        {% if role == 'worker' %}
        <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Worker ID</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-person-badge text-muted"></i></span>
                <input type="text" name="workerId" class="form-control border-start-0" placeholder="e.g. WRK1001" required>
            </div>
        </div>
        {% else %}
        <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control border-start-0" placeholder="name@example.com" required>
            </div>
        </div>
        {% endif %}

        <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-login">Login Now</button>
    </form>

    <div class="footer-text">
        {% if role == 'user' %}
            <p class="mb-1 text-muted">Don't have an account? <a href="/register">Register here</a></p>
            <p class="small text-secondary mt-3"><a href="/login/worker">Are you a Worker? Login here</a></p>
        {% else %}
            <p class="small text-secondary mt-3"><a href="/login/user">Are you a User? Login here</a></p>
        {% endif %}
    </div>
</div>

</body>
</html>
