{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg p-5 mx-auto" style="max-width: 800px; font-family: 'Times New Roman', serif;">
        <h3 class="text-center mb-4 text-decoration-underline">OFFICIAL COMPLAINT LETTER</h3>
        <pre style="white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6;">
            {{ letter }}
        </pre>
        <hr>
        <div class="text-center no-print">
            <button onclick="window.print()" class="btn btn-primary"><i class="bi bi-printer"></i> Print Letter</button>
            <a href="/view-reports" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>
{% endblock %}
