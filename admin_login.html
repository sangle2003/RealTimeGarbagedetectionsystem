{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-success text-white text-center py-4">
                <i class="bi bi-shield-lock-fill display-4"></i>
                <h3 class="mt-2 fw-bold">Admin Login</h3>
                <p class="small text-light opacity-75 mb-0">Smart Garbage Management Portal</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-success">Admin Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope-fill text-success"></i></span>
                            <input type="email" name="email" class="form-control border-start-0 bg-light" required placeholder="admin@system.com">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-success">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key-fill text-success"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 bg-light" required placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm fw-bold mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login Now
                    </button>
                </form>
                
                <div class="text-center mt-2">
                    <a href="/" class="text-decoration-none text-muted small"><i class="bi bi-house-door me-1"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
